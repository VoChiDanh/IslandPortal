# Help lines printed by /islandportal help and /ip.
help:
  header: "IslandPortal commands:"
  reload: "/ip reload - reload config"
  settarget: "/ip settarget <type> - set teleport target to your current location"
  give: "/ip give <type> <player> [amount] - give portal item"
  create: "/ip create <type> - create portal at your current block"
  createisland: "/ip createisland <type> - test default portal-island placement near you"
  npc: "/ip npc spawn <type> [id], /ip npc remove - manage island NPCs"
  minion: "/ip minion give <type> <player> [amount], /ip minion fuel <fuel> <player> [amount], /ip minion booster <fuel> <player> [amount], /ip minion remove, /ip minion inspect - manage minions"
  remove: "/ip remove - remove nearest managed portal"
  pickup: "Shift left-click to pick up. Shift right-click to configure pickup/use/menu access policies."
