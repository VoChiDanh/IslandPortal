# Fuels and boosters shared by every minion type.
#
# Notes:
# - material is the item players insert into the minion fuel slot.
# - duration-seconds controls how long the fuel remains active.
# - speed-multiplier reduces the action interval. Example: 2.0 means roughly twice as fast.
# - output-multiplier multiplies generated drops before they enter storage.
# - bonus-drops are added to each successful action while the fuel is active.
# - These are built-in Minecraft materials only. External item plugin bridges should be
#   added only when the plugin actually calls those APIs.
fuels:
  coal:
    material: COAL
    duration-seconds: 1800
    speed-multiplier: 1.25
    output-multiplier: 1.0
    bonus-drops:
      items: []

  enchanted_coal:
    material: COAL_BLOCK
    duration-seconds: 7200
    speed-multiplier: 1.75
    output-multiplier: 1.25
    bonus-drops:
      items:
        - material: EXPERIENCE_BOTTLE
          amount: 1

  compact_fuel:
    material: CHARCOAL
    duration-seconds: 3600
    speed-multiplier: 1.4
    output-multiplier: 1.0
    bonus-drops:
      items: []

  hyper_catalyst:
    material: BLAZE_ROD
    duration-seconds: 1800
    speed-multiplier: 2.0
    output-multiplier: 1.5
    bonus-drops:
      items:
        - material: EXPERIENCE_BOTTLE
          amount: 2

  harvest_core:
    material: HONEYCOMB
    duration-seconds: 5400
    speed-multiplier: 1.2
    output-multiplier: 1.35
    bonus-drops:
      items:
        - material: BONE_MEAL
          amount: 1

  mining_core:
    material: AMETHYST_SHARD
    duration-seconds: 5400
    speed-multiplier: 1.35
    output-multiplier: 1.2
    bonus-drops:
      items:
        - material: RAW_IRON
          amount: 1
