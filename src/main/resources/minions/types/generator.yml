# Passive resource generators.
#
# Notes:
# - GENERATOR does not require nearby blocks, mobs, water, or chests.
# - The plugin adds the configured drops directly to the minion storage each action.
# - Use this type for simple SkyBlock resources that should work even on empty islands.
# - Do not use inline YAML objects here. Keep each value on its own line for easier editing.
minion-types:
  cobblestone:
    item:
      material: PLAYER_HEAD
      display-name: "<gray>Cobblestone Minion"
      lore:
        - "<dark_gray>Generator Type"
        - "<gray>Creates cobblestone without requiring a placed block."
        - "<gray>Works online and offline, limited by the cap below."
      custom-model-data: 10001
    display:
      name: "<gray>Cobblestone Minion <white>T%tier%"
      head-material: COBBLESTONE
      main-hand-material: STONE_PICKAXE
      small: true
      glowing: false
      health: 20
    action:
      type: GENERATOR
      range: 3
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: COBBLESTONE
      spawn-entity: ZOMBIE
      allowed-materials: []
      sell-materials: []
    limits:
      max-per-owner: 8
    requires-fuel: false
    offline-production-limit-seconds: 21600
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 43200
      - permission: islandportal.minion.offline.mvp
        limit-seconds: 86400
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: COBBLESTONE
          amount: 1
    tiers:
      1:
        interval-seconds: 20
        storage-limit: 64
        upgrade-cost:
          - material: COBBLESTONE
            amount: 64
      2:
        interval-seconds: 15
        storage-limit: 128
        upgrade-cost:
          - material: COBBLESTONE
            amount: 256
      3:
        interval-seconds: 10
        storage-limit: 256
        upgrade-cost:
          - material: COBBLESTONE
            amount: 512

  redstone:
    item:
      material: REDSTONE
      display-name: "<red>Redstone Minion"
      lore:
        - "<dark_gray>Generator Type"
        - "<gray>Creates redstone dust passively."
    display:
      name: "<red>Redstone Minion <white>T%tier%"
      head-material: REDSTONE_BLOCK
      main-hand-material: REDSTONE_TORCH
      small: true
      glowing: false
      health: 20
    action:
      type: GENERATOR
      range: 3
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: REDSTONE_BLOCK
      spawn-entity: ZOMBIE
      allowed-materials: []
      sell-materials: []
    limits:
      max-per-owner: 6
    requires-fuel: false
    offline-production-limit-seconds: 21600
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 43200
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: REDSTONE
          amount: 2
    tiers:
      1:
        interval-seconds: 32
        storage-limit: 96
        upgrade-cost:
          - material: REDSTONE
            amount: 128
      2:
        interval-seconds: 24
        storage-limit: 192
        upgrade-cost:
          - material: REDSTONE
            amount: 384
      3:
        interval-seconds: 18
        storage-limit: 384
        upgrade-cost: []
