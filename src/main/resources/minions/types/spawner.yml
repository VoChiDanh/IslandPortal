# Spawner minions.
#
# Notes:
# - SPAWNER spawns mobs around the minion and also uses configured drops for storage output.
# - Keep max-per-owner and interval-seconds conservative to protect entity counts.
# - Protection and island rules should be handled by your island/protection setup.
minion-types:
  chicken_spawner:
    item:
      material: EGG
      display-name: "<white>Chicken Spawner Minion"
      lore:
        - "<dark_gray>Spawner Type"
        - "<gray>Spawns chickens and stores egg/feather output."
    display:
      name: "<white>Chicken Spawner <gray>T%tier%"
      head-material: EGG
      main-hand-material: EGG
      small: true
      glowing: false
      health: 20
    action:
      type: SPAWNER
      range: 4
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: HAY_BLOCK
      spawn-entity: CHICKEN
      allowed-materials: []
      sell-materials: []
    limits:
      max-per-owner: 4
    requires-fuel: false
    offline-production-limit-seconds: 14400
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 28800
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: EGG
          amount: 1
        - material: FEATHER
          amount: 1
    tiers:
      1:
        interval-seconds: 50
        storage-limit: 64
        upgrade-cost:
          - material: EGG
            amount: 64
      2:
        interval-seconds: 36
        storage-limit: 128
        upgrade-cost:
          - material: FEATHER
            amount: 128
      3:
        interval-seconds: 26
        storage-limit: 256
        upgrade-cost: []

  cow_spawner:
    item:
      material: LEATHER
      display-name: "<gold>Cow Spawner Minion"
      lore:
        - "<dark_gray>Spawner Type"
        - "<gray>Spawns cows and stores leather/beef output."
    display:
      name: "<gold>Cow Spawner <white>T%tier%"
      head-material: LEATHER
      main-hand-material: WHEAT
      small: true
      glowing: false
      health: 24
    action:
      type: SPAWNER
      range: 4
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: HAY_BLOCK
      spawn-entity: COW
      allowed-materials: []
      sell-materials: []
    limits:
      max-per-owner: 4
    requires-fuel: false
    offline-production-limit-seconds: 14400
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 28800
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: LEATHER
          amount: 1
        - material: BEEF
          amount: 1
    tiers:
      1:
        interval-seconds: 60
        storage-limit: 64
        upgrade-cost:
          - material: LEATHER
            amount: 64
      2:
        interval-seconds: 44
        storage-limit: 128
        upgrade-cost:
          - material: BEEF
            amount: 128
      3:
        interval-seconds: 32
        storage-limit: 256
        upgrade-cost: []
