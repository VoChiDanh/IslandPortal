# Farmer minions.
#
# Notes:
# - FARMER harvests crop blocks in range when their material is allowed.
# - For normal crop farms, include the grown crop block material in allowed-materials.
# - Online harvest stores the harvested block material. drops.items is the fallback/offline output.
minion-types:
  wheat:
    item:
      material: HAY_BLOCK
      display-name: "<yellow>Wheat Minion"
      lore:
        - "<dark_gray>Farmer Type"
        - "<gray>Harvests wheat farms in range."
    display:
      name: "<yellow>Wheat Minion <white>T%tier%"
      head-material: HAY_BLOCK
      main-hand-material: IRON_HOE
      small: true
      glowing: false
      health: 20
    action:
      type: FARMER
      range: 4
      blocks-per-action: 2
      smelt-at-tier: 0
      spawn-block: WHEAT
      spawn-entity: ZOMBIE
      allowed-materials:
        - WHEAT
      sell-materials: []
    limits:
      max-per-owner: 6
    requires-fuel: false
    offline-production-limit-seconds: 21600
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 43200
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: WHEAT
          amount: 1
        - material: WHEAT_SEEDS
          amount: 1
    tiers:
      1:
        interval-seconds: 30
        storage-limit: 96
        upgrade-cost:
          - material: WHEAT
            amount: 64
      2:
        interval-seconds: 22
        storage-limit: 192
        upgrade-cost:
          - material: WHEAT
            amount: 256
      3:
        interval-seconds: 16
        storage-limit: 384
        upgrade-cost: []

  crop_farmer:
    item:
      material: GOLDEN_HOE
      display-name: "<green>Crop Farmer Minion"
      lore:
        - "<dark_gray>Farmer Type"
        - "<gray>Supports wheat, carrots, potatoes, beetroot, melon, and pumpkin."
    display:
      name: "<green>Crop Farmer <white>T%tier%"
      head-material: COMPOSTER
      main-hand-material: DIAMOND_HOE
      small: true
      glowing: false
      health: 24
    action:
      type: FARMER
      range: 5
      blocks-per-action: 3
      smelt-at-tier: 0
      spawn-block: WHEAT
      spawn-entity: ZOMBIE
      allowed-materials:
        - WHEAT
        - CARROTS
        - POTATOES
        - BEETROOTS
        - MELON
        - PUMPKIN
      sell-materials: []
    limits:
      max-per-owner: 5
    requires-fuel: false
    offline-production-limit-seconds: 14400
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 28800
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: WHEAT
          amount: 1
        - material: CARROT
          amount: 1
        - material: POTATO
          amount: 1
    tiers:
      1:
        interval-seconds: 36
        storage-limit: 128
        upgrade-cost:
          - material: WHEAT
            amount: 128
      2:
        interval-seconds: 26
        storage-limit: 256
        upgrade-cost:
          - material: CARROT
            amount: 192
      3:
        interval-seconds: 18
        storage-limit: 512
        upgrade-cost: []
