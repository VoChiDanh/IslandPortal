# Collector minions.
#
# Notes:
# - COLLECTOR picks up item entities within range and stores them inside the minion.
# - drops.items is intentionally empty because real drops come from nearby item entities.
# - Offline production is disabled by default because there are no item entities while chunks are unloaded.
minion-types:
  collector:
    item:
      material: HOPPER
      display-name: "<aqua>Collector Minion"
      lore:
        - "<dark_gray>Collector Type"
        - "<gray>Collects item entities around itself."
    display:
      name: "<aqua>Collector Minion <white>T%tier%"
      head-material: HOPPER
      main-hand-material: HOPPER
      small: true
      glowing: false
      health: 20
    action:
      type: COLLECTOR
      range: 6
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: STONE
      spawn-entity: ZOMBIE
      allowed-materials: []
      sell-materials: []
    limits:
      max-per-owner: 4
    requires-fuel: false
    offline-production-limit-seconds: 0
    offline-production-limit-permission: []
    shop:
      enabled: false
      sell-commands: []
    drops:
      items: []
    tiers:
      1:
        interval-seconds: 10
        storage-limit: 256
        upgrade-cost:
          - material: HOPPER
            amount: 1
      2:
        interval-seconds: 7
        storage-limit: 512
        upgrade-cost:
          - material: HOPPER
            amount: 4
      3:
        interval-seconds: 5
        storage-limit: 1024
        upgrade-cost: []
