# Spawner miner minions.
#
# Notes:
# - SPAWNER_MINER places spawn-block in front of the minion, then mines it.
# - This is the safest mining type for SkyBlock servers because it does not need admins
#   to pre-place ore lanes.
# - blocks-per-action controls how many blocks in the forward line are processed.
minion-types:
  stone_spawner_miner:
    item:
      material: STONE
      display-name: "<gray>Stone Spawner Miner"
      lore:
        - "<dark_gray>Spawner Miner Type"
        - "<gray>Spawns stone in front of itself and mines it."
    display:
      name: "<gray>Stone Spawner Miner <white>T%tier%"
      head-material: STONE
      main-hand-material: STONE_PICKAXE
      small: true
      glowing: false
      health: 22
    action:
      type: SPAWNER_MINER
      range: 3
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: STONE
      spawn-entity: ZOMBIE
      allowed-materials:
        - STONE
      sell-materials: []
    limits:
      max-per-owner: 8
    requires-fuel: false
    offline-production-limit-seconds: 21600
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 43200
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: COBBLESTONE
          amount: 1
    tiers:
      1:
        interval-seconds: 18
        storage-limit: 96
        upgrade-cost:
          - material: COBBLESTONE
            amount: 128
      2:
        interval-seconds: 13
        storage-limit: 192
        upgrade-cost:
          - material: COBBLESTONE
            amount: 384
      3:
        interval-seconds: 9
        storage-limit: 384
        upgrade-cost: []

  ore_spawner_miner:
    item:
      material: RAW_IRON
      display-name: "<gold>Ore Spawner Miner"
      lore:
        - "<dark_gray>Spawner Miner Type"
        - "<gray>Spawns iron ore and mines generated drops."
    display:
      name: "<gold>Ore Spawner Miner <white>T%tier%"
      head-material: IRON_ORE
      main-hand-material: IRON_PICKAXE
      small: true
      glowing: false
      health: 26
    action:
      type: SPAWNER_MINER
      range: 3
      blocks-per-action: 1
      smelt-at-tier: 2
      spawn-block: IRON_ORE
      spawn-entity: ZOMBIE
      allowed-materials:
        - IRON_ORE
      sell-materials: []
    limits:
      max-per-owner: 5
    requires-fuel: true
    offline-production-limit-seconds: 14400
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 28800
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: RAW_IRON
          amount: 1
    tiers:
      1:
        interval-seconds: 35
        storage-limit: 64
        upgrade-cost:
          - material: RAW_IRON
            amount: 64
      2:
        interval-seconds: 25
        storage-limit: 128
        upgrade-cost:
          - material: IRON_INGOT
            amount: 96
      3:
        interval-seconds: 18
        storage-limit: 256
        upgrade-cost: []
