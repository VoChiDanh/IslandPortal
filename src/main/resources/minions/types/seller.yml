# Seller minions.
#
# Notes:
# - SELLER sells items from its own storage and the linked chest when shop.enabled is true.
# - sell-commands are executed by console.
# - Available placeholders in sell-commands: %player%, %material%, %item%, %amount%,
#   %price%, %unit_price%, %total_price%, %minion_id%, %type%.
# - Command-based economy/shop integration does not require a soft-depend.
minion-types:
  seller:
    item:
      material: EMERALD
      display-name: "<green>Seller Minion"
      lore:
        - "<dark_gray>Seller Type"
        - "<gray>Sells configured materials using console commands."
        - "<gray>Link it to a chest from the minion GUI."
    display:
      name: "<green>Seller Minion <white>T%tier%"
      head-material: EMERALD_BLOCK
      main-hand-material: EMERALD
      small: true
      glowing: false
      health: 20
    action:
      type: SELLER
      range: 4
      blocks-per-action: 1
      smelt-at-tier: 0
      spawn-block: EMERALD_BLOCK
      spawn-entity: VILLAGER
      allowed-materials: []
      sell-materials:
        - COBBLESTONE
        - STONE
        - WHEAT
        - CARROT
        - POTATO
        - OAK_LOG
        - ROTTEN_FLESH
        - COD
        - SALMON
        - IRON_INGOT
        - GOLD_INGOT
        - DIAMOND
    limits:
      max-per-owner: 3
    requires-fuel: false
    offline-production-limit-seconds: 0
    offline-production-limit-permission: []
    shop:
      enabled: true
      # Prices are per item. If sell-commands is empty, IslandPortal deposits
      # total_price through Vault when Vault is installed.
      # Native lookup sources: SHOPGUI_PLUS, ESSENTIALS, CMI, CONFIG.
      price-sources:
        - SHOPGUI_PLUS
        - ESSENTIALS
        - CMI
        - CONFIG
      default-price: 1.0
      prices:
        COBBLESTONE: 0.25
        STONE: 0.25
        WHEAT: 1.0
        CARROT: 1.0
        POTATO: 1.0
        OAK_LOG: 2.0
        ROTTEN_FLESH: 0.5
        COD: 1.5
        SALMON: 1.75
        IRON_INGOT: 5.0
        GOLD_INGOT: 6.0
        DIAMOND: 25.0
      sell-commands:
        - "eco give %player% %total_price%"
    drops:
      items: []
    tiers:
      1:
        interval-seconds: 30
        storage-limit: 256
        upgrade-cost:
          - material: EMERALD
            amount: 16
      2:
        interval-seconds: 20
        storage-limit: 512
        upgrade-cost:
          - material: EMERALD
            amount: 48
      3:
        interval-seconds: 12
        storage-limit: 1024
        upgrade-cost: []
