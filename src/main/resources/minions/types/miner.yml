# Miner minions.
#
# Notes:
# - MINER checks blocks in front of the minion, up to range and blocks-per-action.
# - Only blocks listed in allowed-materials are mined.
# - smelt-at-tier turns common ores into ingots once the minion reaches that tier.
# - Use rotate in the minion GUI to change the direction it mines.
minion-types:
  miner:
    item:
      material: IRON_PICKAXE
      # Native item selectors are supported here:
      # itemsadder:namespace:id, oraxen:id, nexo:id, mmoitems:type:id, mythicmobs:id.
      item: IRON_PICKAXE
      display-name: "<gray>Miner Minion"
      lore:
        - "<dark_gray>Miner Type"
        - "<gray>Mines configured blocks in front of itself."
        - "<gray>Higher tiers can mine more often and hold more items."
        - "<dark_gray>Actions: <gray>%actions%"
    display:
      name: "<gray>Miner Minion <white>T%tier%"
      head-material: IRON_BLOCK
      main-hand-material: IRON_PICKAXE
      # Native skin selectors are supported here:
      # hdb:id, itemsadder:namespace:id, oraxen:id, nexo:id.
      head-item: IRON_BLOCK
      small: true
      glowing: false
      health: 24
      animations:
        swing:
          delay-ticks: 0
          duration-ticks: 14
          right-arm:
            x: -70
            y: 0
            z: 0
    action:
      type: MINER
      range: 4
      blocks-per-action: 1
      smelt-at-tier: 3
      spawn-block: STONE
      spawn-entity: ZOMBIE
      allowed-materials:
        - STONE
        - COBBLESTONE
        - COAL_ORE
        - DEEPSLATE_COAL_ORE
        - IRON_ORE
        - DEEPSLATE_IRON_ORE
        - COPPER_ORE
        - DEEPSLATE_COPPER_ORE
        - GOLD_ORE
        - DEEPSLATE_GOLD_ORE
        - REDSTONE_ORE
        - DEEPSLATE_REDSTONE_ORE
        - LAPIS_ORE
        - DEEPSLATE_LAPIS_ORE
        - DIAMOND_ORE
        - DEEPSLATE_DIAMOND_ORE
        - EMERALD_ORE
        - DEEPSLATE_EMERALD_ORE
      sell-materials: []
    limits:
      max-per-owner: 6
    requires-fuel: false
    offline-production-limit-seconds: 14400
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.vip
        limit-seconds: 28800
      - permission: islandportal.minion.offline.mvp
        limit-seconds: 57600
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: COBBLESTONE
          amount: 1
    tiers:
      1:
        interval-seconds: 24
        storage-limit: 64
        upgrade-cost:
          - material: COBBLESTONE
            amount: 128
      2:
        interval-seconds: 18
        storage-limit: 128
        upgrade-cost:
          - material: IRON_INGOT
            amount: 32
      3:
        interval-seconds: 14
        storage-limit: 256
        upgrade-cost:
          - material: GOLD_INGOT
            amount: 32
      4:
        interval-seconds: 10
        storage-limit: 512
        upgrade-cost: []

  diamond_miner:
    item:
      material: DIAMOND_PICKAXE
      display-name: "<aqua>Diamond Miner Minion"
      lore:
        - "<dark_gray>Miner Type"
        - "<gray>Focused miner for diamond ore lanes."
    display:
      name: "<aqua>Diamond Miner <white>T%tier%"
      head-material: DIAMOND_BLOCK
      main-hand-material: DIAMOND_PICKAXE
      small: true
      glowing: true
      health: 30
    action:
      type: MINER
      range: 5
      blocks-per-action: 2
      smelt-at-tier: 0
      spawn-block: DIAMOND_ORE
      spawn-entity: ZOMBIE
      allowed-materials:
        - DIAMOND_ORE
        - DEEPSLATE_DIAMOND_ORE
      sell-materials: []
    limits:
      max-per-owner: 3
    requires-fuel: true
    offline-production-limit-seconds: 7200
    offline-production-limit-permission:
      - permission: islandportal.minion.offline.mvp
        limit-seconds: 21600
    shop:
      enabled: false
      sell-commands: []
    drops:
      items:
        - material: DIAMOND
          amount: 1
    tiers:
      1:
        interval-seconds: 60
        storage-limit: 64
        upgrade-cost:
          - material: DIAMOND
            amount: 32
      2:
        interval-seconds: 45
        storage-limit: 128
        upgrade-cost:
          - material: DIAMOND
            amount: 96
      3:
        interval-seconds: 30
        storage-limit: 256
        upgrade-cost: []
