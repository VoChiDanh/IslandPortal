# Master switch for the plugin. Set to false to stop all portal handling without removing data.
enabled: true

# Prints internal placement, cleanup, and migration details to the console.
# Keep this disabled on production unless you are diagnosing portal creation.
debug: false

# Compatibility/runtime integration settings.
hooks:
  bentobox: true
  superior-skyblock: true
  skyllia: true

commands:
  description: "Manage island portals"
  aliases:
    - ip

runtime:
  # Autosaves dirty in-memory portal data to playerdata every N minutes.
  # File I/O is dispatched asynchronously by the platform scheduler.
  autosave-interval-minutes: 10
  # Prevents vanilla Nether travel while a player is inside a managed portal.
  vanilla-portal-cooldown-ticks: 200
  # Per-player managed portal action cooldown.
  use-cooldown-millis: 1000
  # Nearby lookup radius used when vanilla portal events report a shifted position.
  portal-near-scan:
    horizontal: 2
    below: 1
    above: 2

island-npcs:
  # Master switch for island NPC handling.
  enabled: true
  # Per-player cooldown for clicking NPCs.
  interaction-cooldown-millis: 750
  # How often NPCs rotate to face nearby players.
  look-interval-ticks: 10
  # How often IslandNPC processes small wander steps.
  movement-interval-ticks: 10
  # How often IslandNPC checks whether managed entities disappeared or died.
  respawn-check-ticks: 40
  # Delay before respawning a managed NPC after it dies/disappears.
  respawn-delay-ticks: 40
  # Delay after island creation before default NPCs are placed.
  creation-delay-ticks: 60

minions:
  # Master switch for minion placement, production, GUI, and respawn handling.
  enabled: true
  # How often minions calculate production.
  tick-interval-ticks: 20
  # Autosaves dirty minion data every N minutes.
  autosave-interval-minutes: 5
  # How often missing/dead minion display entities are respawned.
  respawn-check-ticks: 60
  # Limits production operations per tick loop to protect large servers.
  max-actions-per-tick: 250
  # Safe placement scan radius if the clicked block is not a valid stand location.
  place-radius: 4

# How long to wait after a skyblock island-create event before placing default portals.
# Use this when the island plugin still needs a few ticks to paste schematics or finish hooks.
creation-delay-ticks: 60
# If the first placement scan runs while the island plugin is still pasting blocks,
# retry a few times before giving up.
creation-retry-attempts: 5
creation-retry-delay-ticks: 40

# Radius used during island deletion cleanup when an exact island id is not available.
# Any managed portal near the deleted island center inside this radius can be cleaned up.
island-cleanup-radius: 100
