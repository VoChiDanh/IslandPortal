name: Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  pull_request:
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

jobs:
  validate-wiki:
    name: Validate wiki markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check wiki files
        shell: bash
        run: |
          test -f wiki/Home.md
          test -f wiki/Folia-Architecture.md
          test -f wiki/Configuration.md
          test -f wiki/Schematic-Portal-Islands.md
          test -f wiki/Troubleshooting.md
          ! grep -R $'\r' wiki

      - name: Upload wiki artifact
        uses: actions/upload-artifact@v4
        with:
          name: IslandPortal-wiki
          path: wiki/*.md
