name: Build

on:
  push:
    branches:
      - main
      - master
      - "release/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew build --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: IslandPortal-jars
          path: build/libs/*.jar
